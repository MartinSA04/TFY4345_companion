# Build this course and deploy it to GitHub Pages on every push to main.
#
# One-time setup:
#   1. Repo Settings → Pages → Source: "GitHub Actions".
#   2. Commit a pnpm-lock.yaml (run `pnpm install` once) so the frozen install
#      below is reproducible.
#   3. Custom domain (recommended): the framework's links/assets are absolute
#      (served at root), so a project-page subpath would break them. Add a
#      `public/CNAME` file with your domain and set it in Settings → Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Astro 6 requires Node >=22.12
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
